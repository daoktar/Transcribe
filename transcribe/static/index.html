<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transcribe</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="masthead reveal">
  <h1 class="wordmark">Transcribe<span class="mark" aria-hidden="true">.</span></h1>
  <p class="folio">Local machine &middot; whisper.cpp &middot; nothing leaves this Mac</p>
</header>
<div class="double-rule reveal" aria-hidden="true"></div>

<main>
  <p id="notice" class="notice" role="alert" hidden></p>

  <!-- ============ SETUP ============ -->
  <section id="stage-setup" class="stage">
    <div id="dropzone" class="dropzone reveal d1" tabindex="0" role="button"
         aria-label="Add audio or video files">
      <div class="wave" id="wave" aria-hidden="true"></div>
      <h2 class="drop-title">Drop a recording here<span class="mark">.</span></h2>
      <p class="drop-sub">or click to browse &mdash; <span id="ext-list"></span></p>
    </div>
    <input type="file" id="file-input" multiple hidden>

    <ol id="manifest" class="manifest" hidden></ol>

    <section class="sheet reveal d2" aria-label="Settings">
      <h3 class="sheet-label">Settings</h3>
      <div class="grid">
        <div class="field field--select">
          <label for="model">Model</label>
          <select id="model"></select>
        </div>
        <div class="field field--select">
          <label for="engine">Engine</label>
          <select id="engine"></select>
        </div>
        <div class="field field--select">
          <label for="language">Language</label>
          <select id="language">
            <option value="">Auto detect</option>
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="it">Italiano</option>
            <option value="kk">Қазақша</option>
            <option value="nl">Nederlands</option>
            <option value="pl">Polski</option>
            <option value="pt">Português</option>
            <option value="tr">Türkçe</option>
            <option value="uk">Українська</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="zh">中文</option>
          </select>
        </div>
        <div class="field">
          <label for="num-speakers">Speakers</label>
          <input id="num-speakers" type="number" min="1" max="20" placeholder="auto" disabled>
        </div>
      </div>

      <div class="switches">
        <label class="check">
          <input type="checkbox" id="diarize"><span class="box" aria-hidden="true"></span>
          Label speakers (diarization)
        </label>
        <label class="check" id="save-alongside-wrap" hidden>
          <input type="checkbox" id="save-alongside"><span class="box" aria-hidden="true"></span>
          Save .txt next to the source files
        </label>
      </div>

      <div class="field token-field" id="token-wrap" hidden>
        <label for="hf-token">HuggingFace token</label>
        <input id="hf-token" type="password" placeholder="hf_…" autocomplete="off"
               spellcheck="false">
      </div>
      <p class="token-note" id="token-note" hidden>HF token found in environment ✓</p>
    </section>

    <button id="start-btn" class="btn-block reveal d3" disabled>Transcribe &rarr;</button>
  </section>

  <!-- ============ WORKING ============ -->
  <section id="stage-work" class="stage" hidden>
    <ol id="work-manifest" class="manifest manifest--status"></ol>

    <div class="progress">
      <div class="progress-rail"><div id="progress-fill" class="progress-fill"></div></div>
      <div class="progress-row">
        <p id="progress-msg" class="progress-msg" aria-live="polite">Starting…</p>
        <p id="progress-pct" class="progress-pct">0%</p>
      </div>
    </div>

    <div class="work-actions">
      <button id="cancel-btn" class="btn-ghost">Cancel</button>
      <button id="work-back-btn" class="btn-ghost" hidden>&larr; Start over</button>
    </div>
  </section>

  <!-- ============ READING ============ -->
  <section id="stage-read" class="stage" hidden>
    <nav id="file-tabs" class="file-tabs" aria-label="Transcribed files" hidden></nav>

    <header class="read-head">
      <h2 id="read-title" class="read-title"></h2>
      <p id="read-meta" class="read-meta"></p>
    </header>

    <div id="view-toggle" class="view-toggle" role="group" aria-label="Transcript view" hidden>
      <button data-view="plain" class="toggle-btn">Plain text</button>
      <button data-view="speakers" class="toggle-btn">By speaker</button>
    </div>

    <div id="diarize-note" class="diarize-note" hidden>
      <p id="diarize-error-msg" class="diarize-error"></p>
      <div class="retry-row">
        <input id="retry-token" type="password" placeholder="hf_…" autocomplete="off"
               spellcheck="false" hidden>
        <button id="retry-btn" class="btn-small">Retry speaker detection</button>
      </div>
    </div>

    <div class="read-actions">
      <button id="copy-btn" class="btn-small">Copy</button>
      <button id="download-btn" class="btn-small btn-small--primary">Save transcript</button>
      <button id="reset-btn" class="btn-ghost">New transcription &rarr;</button>
    </div>

    <article id="transcript" class="transcript"></article>
  </section>
</main>

<footer class="colophon reveal d4">
  <p>Set in New York &amp; JetBrains Mono &middot; proofed on this machine</p>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
